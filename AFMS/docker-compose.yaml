version: '3.8'

services:
  afms:
    build:
      context: ./AFMS
      dockerfile: Dockerfile
    container_name: afms-app
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      # RDS Connection String (SQL Server)
      ConnectionStrings__DefaultConnection: "Server=${DB_SERVER};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=false;"
      
      # ASP.NET Configuration
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080;https://+:8443"
      
      # AeroDataBox API Configuration
      AeroDataBox__ApiKey: "${AERODATABOX_API_KEY}"
      AeroDataBox__ApiHost: "${AERODATABOX_API_HOST}"
      AeroDataBox__DefaultAirport: "${DEFAULT_AIRPORT:-EGLL}"

      
      # DeepSeek API Configuration
      DeepSeek__ApiKey: "${DEEPSEEK_API_KEY}"
      DeepSeek__ApiEndpoint: "${DEEPSEEK_API_ENDPOINT}"
      DeepSeek__Model: "deepseek-chat"
    
    depends_on:
      - afms-db
    
    networks:
      - afms-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Local SQL Server for development/testing
  # Remove or comment out this section when using RDS in production
  afms-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: afms-db
    environment:
      SA_PASSWORD: "${DB_PASSWORD:-YourStrongPassword123!}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    
    ports:
      - "1433:1433"
    
    volumes:
      - afms-db-volume:/var/opt/mssql
    
    networks:
      - afms-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:-YourStrongPassword123!}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  afms-db-volume:

networks:
  afms-network:
    driver: bridge
